name: Generate Signing Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore bikerun.keystore \
            -alias bikerun \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass bikerun123 \
            -keypass bikerun123 \
            -dname "CN=Bike Run App, O=BikeRun, C=IL"

      - name: Base64 encode keystore
        run: base64 -w 0 bikerun.keystore > keystore-base64.txt

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: |
            bikerun.keystore
            keystore-base64.txt
          retention-days: 1
