name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload to release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bikerun.keystore

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          BIKERUN_STORE_FILE: bikerun.keystore
          BIKERUN_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BIKERUN_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BIKERUN_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Read version from package.json
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
